<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS game_p_01</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <div class="game-wrapper">
        <header>
            <div class="logo">RPS<span>PRO</span></div>
            <select id="theme-switcher">
                <option value="dark">Eclipse Dark</option>
                <option value="neon">Cyber Neon</option>
                <option value="royal">Royal Gold</option>
            </select>
        </header>

        <div class="score-board">
            <div class="score-card player">
                <span class="label">PLAYER</span>
                <span id="p-score">0</span>
            </div>
            <div class="divider">VS</div>
            <div class="score-card computer">
                <span class="label">CPU</span>
                <span id="c-score">0</span>
            </div>
        </div>

        <div class="arena">
            <div class="hand-slot" id="p-slot">
                <div class="hand-inner">
                    <i class="fa-solid fa-hand-back-fist" id="p-hand"></i>
                </div>
            </div>

            <div class="status-msg" id="status">READY?</div>

            <div class="hand-slot" id="c-slot">
                <div class="hand-inner">
                    <i class="fa-solid fa-hand-back-fist" id="c-hand"></i>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" data-choice="rock">
                <i class="fa-solid fa-hand-back-fist"></i>
                <span>ROCK</span>
            </button>
            <button class="btn" data-choice="paper">
                <i class="fa-solid fa-hand"></i>
                <span>PAPER</span>
            </button>
            <button class="btn" data-choice="scissors">
                <i class="fa-solid fa-hand-scissors"></i>
                <span>SCISSORS</span>
            </button>
        </div>

        <footer>
            <div class="dev-badge">
                <i class="fa-solid fa-code"></i>
                <span>Developed by <strong>[kartik_gohel]</strong></span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
